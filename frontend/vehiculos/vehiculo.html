<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>SERVICAR - Vehículos</title></head>
<body>
    <div style="background:#16213e;padding:10px 20px;border-bottom:2px solid #e94560;">
        <a href="../index.html" style="color:#e94560;text-decoration:none;font-weight:bold;">← Menú Principal</a>
    </div>
    <h1>SERVICAR - Gestión de Vehículos</h1>
    <h2 id="titulo-form">Registrar Vehículo</h2>
    <form id="form-vehiculo">
        <label>ID Usuario:</label><br>
        <input type="number" id="id_usuario" required><br><br>
        <label>ID Modelo:</label><br>
        <input type="number" id="id_modelo" required><br><br>
        <label>ID Combustible:</label><br>
        <input type="number" id="id_combustible" required><br><br>
        <label>ID Transmisión:</label><br>
        <input type="number" id="id_transmision" required><br><br>
        <label>Placa:</label><br>
        <input type="text" id="placa" required><br><br>
        <label>Año de Fabricación:</label><br>
        <input type="number" id="anio_fabricacion" required><br><br>
        <label>Color:</label><br>
        <input type="text" id="color"><br><br>
        <label>Nro. Chasis:</label><br>
        <input type="text" id="numero_chasis"><br><br>
        <label>Nro. Motor:</label><br>
        <input type="text" id="numero_motor"><br><br>
        <label>Kilometraje Actual:</label><br>
        <input type="number" id="kilometraje_actual" value="0"><br><br>
        <label>Activo:</label>
        <input type="checkbox" id="activo" checked><br><br>
        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
    </form>
    <hr>
    <h2>Listado de Vehículos</h2>
    <ul id="data"><li>Cargando...</li></ul>
    <script src="vehiculo.js"></script>
</body>
</html>
