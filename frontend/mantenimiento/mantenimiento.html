<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICAR - Mantenimientos</title>
</head>
<body>
    <h1>SERVICAR - Gestión de Mantenimientos</h1>

    <!-- FORMULARIO -->
    <h2 id="titulo-form">Registrar Mantenimiento</h2>
    <form id="form-mantenimiento">
        <label>ID Mantenimiento:</label><br>
        <input type="number" id="id_mantenimiento" required><br><br>

        <label>ID Vehículo:</label><br>
        <input type="number" id="id_vehiculo" required><br><br>

        <label>ID Tipo Servicio:</label><br>
        <input type="number" id="id_tipo_servicio" required><br><br>

        <label>ID Mecánico (opcional):</label><br>
        <input type="number" id="id_mecanico"><br><br>

        <label>ID Usuario Registro:</label><br>
        <input type="number" id="id_usuario_registro" required><br><br>

        <label>Fecha de Servicio:</label><br>
        <input type="date" id="fecha_servicio" required><br><br>

        <label>Kilometraje al Servicio:</label><br>
        <input type="number" id="kilometraje_servicio" min="0" required><br><br>

        <label>Costo Mano de Obra (Bs.):</label><br>
        <input type="number" id="costo_mano_obra" step="0.01" value="0" min="0"><br><br>

        <label>Observaciones:</label><br>
        <textarea id="observaciones" rows="3" cols="40"></textarea><br><br>

        <label>Próxima Fecha (opcional):</label><br>
        <input type="date" id="proxima_fecha"><br><br>

        <label>Próximo Kilometraje (opcional):</label><br>
        <input type="number" id="proximo_kilometraje" min="0"><br><br>

        <label>Estado:</label><br>
        <select id="estado">
            <option value="completado">Completado</option>
            <option value="en_proceso">En Proceso</option>
            <option value="pendiente">Pendiente</option>
            <option value="cancelado">Cancelado</option>
        </select><br><br>

        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
    </form>

    <hr>

    <!-- FILTRO POR VEHÍCULO -->
    <h2>Historial por Vehículo</h2>
    <label>ID Vehículo a consultar:</label>
    <input type="number" id="filtro_vehiculo">
    <button onclick="cargarHistorial()">Ver Historial</button>

    <hr>

    <!-- LISTADO GENERAL -->
    <h2>Todos los Mantenimientos</h2>
    <div id="listado">
        <ul id="data">
            <li>Cargando...</li>
        </ul>
    </div>

    <script src="mantenimiento.js"></script>
</body>
</html>
