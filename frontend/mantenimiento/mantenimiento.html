<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>SERVICAR - Mantenimientos</title></head>
<body>
    <div style="background:#16213e;padding:10px 20px;border-bottom:2px solid #e94560;">
        <a href="../index.html" style="color:#e94560;text-decoration:none;font-weight:bold;">← Menú Principal</a>
    </div>
    <h1>SERVICAR - Registro de Mantenimientos</h1>
    <h2 id="titulo-form">Registrar Mantenimiento</h2>
    <form id="form-m">
        <label>ID Vehículo:</label><br>
        <input type="number" id="id_vehiculo" required><br><br>
        <label>ID Tipo Servicio:</label><br>
        <input type="number" id="id_tipo_servicio" required><br><br>
        <label>ID Mecánico (opcional):</label><br>
        <input type="number" id="id_mecanico"><br><br>
        <label>ID Usuario Registro:</label><br>
        <input type="number" id="id_usuario_registro" required><br><br>
        <label>Fecha Servicio:</label><br>
        <input type="date" id="fecha_servicio" required><br><br>
        <label>Kilometraje Servicio:</label><br>
        <input type="number" id="kilometraje_servicio" required><br><br>
        <label>Costo Mano de Obra (Bs.):</label><br>
        <input type="number" id="costo_mano_obra" step="0.01" value="0"><br><br>
        <label>Observaciones:</label><br>
        <textarea id="observaciones" rows="3" cols="40"></textarea><br><br>
        <label>Próxima Fecha:</label><br>
        <input type="date" id="proxima_fecha"><br><br>
        <label>Próximo Kilometraje:</label><br>
        <input type="number" id="proximo_kilometraje"><br><br>
        <label>Estado:</label><br>
        <select id="estado">
            <option value="completado">Completado</option>
            <option value="en_proceso">En Proceso</option>
            <option value="pendiente">Pendiente</option>
            <option value="cancelado">Cancelado</option>
        </select><br><br>
        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
    </form>
    <hr>
    <h2>Historial por Vehículo</h2>
    <label>ID Vehículo:</label>
    <input type="number" id="filtro_vehiculo">
    <button onclick="cargarPorVehiculo()">Buscar</button>
    <button onclick="cargarTodos()">Ver Todos</button>
    <hr>
    <h2>Listado de Mantenimientos</h2>
    <ul id="data"><li>Cargando...</li></ul>
    <script src="mantenimiento.js"></script>
</body>
</html>
