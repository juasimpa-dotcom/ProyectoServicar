<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>SERVICAR - Tipos de Servicio</title></head>
<body>
    <div style="background:#16213e;padding:10px 20px;border-bottom:2px solid #e94560;">
        <a href="../index.html" style="color:#e94560;text-decoration:none;font-weight:bold;">← Menú Principal</a>
    </div>
    <h1>SERVICAR - Tipos de Servicio</h1>
    <h2 id="titulo-form">Registrar Tipo de Servicio</h2>
    <form id="form-ts">
        <label>ID Categoría:</label><br>
        <input type="number" id="id_categoria" required><br><br>
        <label>Nombre:</label><br>
        <input type="text" id="nombre" required><br><br>
        <label>Descripción:</label><br>
        <textarea id="descripcion" rows="3" cols="40"></textarea><br><br>
        <label>Intervalo Km:</label><br>
        <input type="number" id="intervalo_km" min="1"><br><br>
        <label>Intervalo Días:</label><br>
        <input type="number" id="intervalo_dias" min="1"><br><br>
        <label>Activo:</label>
        <input type="checkbox" id="activo" checked><br><br>
        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
    </form>
    <hr>
    <h2>Listado de Tipos de Servicio</h2>
    <ul id="data"><li>Cargando...</li></ul>
    <script src="tipo_servicio.js"></script>
</body>
</html>
