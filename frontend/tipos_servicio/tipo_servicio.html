<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SERVICAR — Tipos de Servicio</title><link rel="stylesheet" href="../servicar.css"></head>
<body>
<div class="navbar"><a href="../index.html">← Menú</a><span class="breadcrumb">/ Tipos de Servicio</span></div>
<div class="page-header"><h1>🛠️ <span>Tipos de Servicio</span></h1><p>Cambio de aceite, frenos, alineación y más</p></div>
<div class="contenido">
  <div class="form-card">
    <div class="form-title" id="titulo-form">➕ Registrar Tipo de Servicio</div>
    <form id="form">
      <div class="form-grid">
        <div class="form-group"><label>ID Categoría</label><input type="number" id="id_categoria" placeholder="ID categoría" required></div>
        <div class="form-group"><label>Nombre</label><input type="text" id="nombre" placeholder="Ej: Cambio de aceite" required></div>
        <div class="form-group full"><label>Descripción</label><textarea id="descripcion" placeholder="Descripción del servicio..."></textarea></div>
        <div class="form-group"><label>Intervalo Km</label><input type="number" id="intervalo_km" placeholder="Ej: 5000" min="1"></div>
        <div class="form-group"><label>Intervalo Días</label><input type="number" id="intervalo_dias" placeholder="Ej: 90" min="1"></div>
        <div class="form-group"><div class="check-group"><input type="checkbox" id="activo" checked><label for="activo">Servicio activo</label></div></div>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <button type="button" id="btn-cancelar" class="btn btn-secondary" style="display:none">✕ Cancelar</button>
      </div>
    </form>
  </div>
  <div class="list-header"><div class="list-title">📋 Listado <span class="list-count" id="count">0</span></div></div>
  <div class="tabla-wrap"><table>
    <thead><tr><th>ID</th><th>Categoría</th><th>Nombre</th><th>Intervalo Km</th><th>Intervalo Días</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="7" class="sin-datos">Cargando...</td></tr></tbody>
  </table></div>
</div>
<script src="../servicar.js"></script>
<script src="tipo_servicio.js"></script>
</body></html>
