<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SERVICAR — Usuarios</title><link rel="stylesheet" href="../servicar.css"></head>
<body>
<div class="navbar"><a href="../index.html">← Menú</a><span class="breadcrumb">/ Usuarios</span></div>
<div class="page-header"><h1>🧑 <span>Usuarios</span> del Sistema</h1><p>Personas que acceden a SERVICAR</p></div>
<div class="contenido">
  <div class="form-card">
    <div class="form-title" id="titulo-form">➕ Registrar Usuario</div>
    <form id="form">
      <div class="form-grid">
        <div class="form-group"><label>ID Rol</label><input type="number" id="id_rol" placeholder="Ej: 1" required></div>
        <div class="form-group"><label>Nombres</label><input type="text" id="nombres" placeholder="Nombres" required></div>
        <div class="form-group"><label>Apellidos</label><input type="text" id="apellidos" placeholder="Apellidos" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="correo@ejemplo.com" required></div>
        <div class="form-group"><label>Teléfono</label><input type="text" id="telefono" placeholder="Ej: 77712345"></div>
        <div class="form-group"><div class="check-group"><input type="checkbox" id="activo" checked><label for="activo">Usuario activo</label></div></div>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <button type="button" id="btn-cancelar" class="btn btn-secondary" style="display:none">✕ Cancelar</button>
      </div>
    </form>
  </div>
  <div class="list-header"><div class="list-title">📋 Listado de Usuarios <span class="list-count" id="count">0</span></div></div>
  <div class="tabla-wrap"><table>
    <thead><tr><th>ID</th><th>Nombres</th><th>Apellidos</th><th>Email</th><th>Teléfono</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="8" class="sin-datos">Cargando...</td></tr></tbody>
  </table></div>
</div>
<script src="../servicar.js"></script>
<script src="usuario.js"></script>
</body></html>
