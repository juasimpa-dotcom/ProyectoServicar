<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICAR - Mecánicos</title>
</head>
<body>
    <h1>SERVICAR - Gestión de Mecánicos</h1>

    <h2 id="titulo-form">Registrar Mecánico</h2>
    <form id="form-mecanico">
        <label>ID Mecánico:</label><br>
        <input type="number" id="id_mecanico" required><br><br>

        <label>ID Usuario (opcional):</label><br>
        <input type="number" id="id_usuario"><br><br>

        <label>Nombres:</label><br>
        <input type="text" id="nombres" required><br><br>

        <label>Apellidos:</label><br>
        <input type="text" id="apellidos" required><br><br>

        <label>Especialidad:</label><br>
        <input type="text" id="especialidad"><br><br>

        <label>Teléfono:</label><br>
        <input type="text" id="telefono"><br><br>

        <label>Activo:</label>
        <input type="checkbox" id="activo" checked><br><br>

        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
    </form>

    <hr>
    <h2>Listado de Mecánicos</h2>
    <ul id="data"><li>Cargando...</li></ul>

    <script src="mecanico.js"></script>
</body>
</html>
