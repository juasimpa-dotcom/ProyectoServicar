<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SERVICAR — Alertas</title><link rel="stylesheet" href="../servicar.css"></head>
<body>
<div class="navbar"><a href="../index.html">← Menú</a><span class="breadcrumb">/ Alertas</span></div>
<div class="page-header"><h1>🔔 <span>Alertas</span> de Mantenimiento</h1><p>Recordatorios automáticos por km o fecha</p></div>
<div class="contenido">
  <div class="form-card">
    <div class="form-title" id="titulo-form">➕ Registrar Alerta</div>
    <form id="form">
      <div class="form-grid">
        <div class="form-group"><label>ID Vehículo</label><input type="number" id="id_vehiculo" placeholder="ID vehículo" required></div>
        <div class="form-group"><label>ID Tipo Servicio</label><input type="number" id="id_tipo_servicio" placeholder="ID tipo servicio" required></div>
        <div class="form-group"><label>ID Mantenimiento (opcional)</label><input type="number" id="id_mantenimiento" placeholder="ID mantenimiento"></div>
        <div class="form-group"><label>Tipo de Alerta</label>
          <select id="tipo_alerta">
            <option value="por_km">Por Km</option>
            <option value="por_fecha">Por Fecha</option>
            <option value="ambos">Ambos</option>
          </select>
        </div>
        <div class="form-group"><label>Fecha Alerta</label><input type="date" id="fecha_alerta"></div>
        <div class="form-group"><label>Kilometraje Alerta</label><input type="number" id="kilometraje_alerta" placeholder="Km de alerta"></div>
        <div class="form-group"><label>Estado</label>
          <select id="estado">
            <option value="pendiente">Pendiente</option>
            <option value="visto">Visto</option>
            <option value="atendido">Atendido</option>
            <option value="ignorado">Ignorado</option>
          </select>
        </div>
        <div class="form-group full"><label>Mensaje</label><textarea id="mensaje" placeholder="Mensaje de la alerta..."></textarea></div>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <button type="button" id="btn-cancelar" class="btn btn-secondary" style="display:none">✕ Cancelar</button>
      </div>
    </form>
  </div>
  <div class="filtro-card">
    <span>🔍 Filtrar:</span>
    <input type="number" id="filtro_v" placeholder="ID Vehículo">
    <button class="btn btn-primary" onclick="filtrarV()">Por Vehículo</button>
    <button class="btn btn-secondary" style="border-color:#ffb300;color:#ffb300;" onclick="cargarPendientes()">⚠️ Pendientes</button>
    <button class="btn btn-secondary" onclick="cargar()">Ver Todas</button>
  </div>
  <div class="list-header"><div class="list-title">📋 Listado de Alertas <span class="list-count" id="count">0</span></div></div>
  <div class="tabla-wrap"><table>
    <thead><tr><th>ID</th><th>Vehículo</th><th>Tipo Servicio</th><th>Tipo Alerta</th><th>Fecha</th><th>Km Alerta</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="8" class="sin-datos">Cargando...</td></tr></tbody>
  </table></div>
</div>
<script src="../servicar.js"></script>
<script src="alerta.js"></script>
</body></html>
