<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICAR - Repuestos</title>
</head>
<body>
    <h1>SERVICAR - Gestión de Repuestos</h1>

    <h2 id="titulo-form">Registrar Repuesto</h2>
    <form id="form-repuesto">
        <label>ID Repuesto:</label><br>
        <input type="number" id="id_repuesto" required><br><br>

        <label>Código (opcional):</label><br>
        <input type="text" id="codigo"><br><br>

        <label>Nombre:</label><br>
        <input type="text" id="nombre" required><br><br>

        <label>Marca del Repuesto:</label><br>
        <input type="text" id="marca_repuesto"><br><br>

        <label>Unidad de Medida:</label><br>
        <input type="text" id="unidad_medida" value="unidad" required><br><br>

        <label>Precio Unitario (Bs.):</label><br>
        <input type="number" id="precio_unitario" step="0.01" min="0"><br><br>

        <label>Activo:</label>
        <input type="checkbox" id="activo" checked><br><br>

        <button type="submit">Guardar</button>
        <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
    </form>

    <hr>
    <h2>Listado de Repuestos</h2>
    <ul id="data"><li>Cargando...</li></ul>

    <script src="repuesto.js"></script>
</body>
</html>
