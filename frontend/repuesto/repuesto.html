<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SERVICAR — Repuestos</title><link rel="stylesheet" href="../servicar.css"></head>
<body>
<div class="navbar"><a href="../index.html">← Menú</a><span class="breadcrumb">/ Repuestos</span></div>
<div class="page-header"><h1>🔩 <span>Repuestos</span></h1><p>Catálogo de piezas y repuestos del taller</p></div>
<div class="contenido">
  <div class="form-card">
    <div class="form-title" id="titulo-form">➕ Registrar Repuesto</div>
    <form id="form">
      <div class="form-grid">
        <div class="form-group"><label>Código (opcional)</label><input type="text" id="codigo" placeholder="Ej: REP-001"></div>
        <div class="form-group"><label>Nombre</label><input type="text" id="nombre" placeholder="Nombre del repuesto" required></div>
        <div class="form-group"><label>Marca del Repuesto</label><input type="text" id="marca_repuesto" placeholder="Ej: Bosch"></div>
        <div class="form-group"><label>Unidad de Medida</label><input type="text" id="unidad_medida" value="unidad" required></div>
        <div class="form-group"><label>Precio Unitario (Bs.)</label><input type="number" id="precio_unitario" step="0.01" min="0" placeholder="0.00"></div>
        <div class="form-group"><div class="check-group"><input type="checkbox" id="activo" checked><label for="activo">Repuesto activo</label></div></div>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <button type="button" id="btn-cancelar" class="btn btn-secondary" style="display:none">✕ Cancelar</button>
      </div>
    </form>
  </div>
  <div class="list-header"><div class="list-title">📋 Listado de Repuestos <span class="list-count" id="count">0</span></div></div>
  <div class="tabla-wrap"><table>
    <thead><tr><th>ID</th><th>Código</th><th>Nombre</th><th>Marca</th><th>Unidad</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="8" class="sin-datos">Cargando...</td></tr></tbody>
  </table></div>
</div>
<script src="../servicar.js"></script>
<script src="repuesto.js"></script>
</body></html>
